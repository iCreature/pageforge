name: Deploy to PyPI

on:
  push:
    branches:
      - DF-02
  workflow_dispatch:  # Allow manual triggering

# No global permissions block needed for token authentication

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools setuptools-scm wheel

      - name: Build package
        run: |
          python -m build

      - name: Check distribution
        run: |
          python -m twine check dist/*

      # Run tests before deploying
      - name: Install test dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest

      # Only publish to Test PyPI on main branch pushes (non-tag)
      # Using token-based authentication for TestPyPI
      - name: Publish to PyPI (Test)
        uses: pypa/gh-action-pypi-publish@v1.8.11
        with:
          password: ${{ secrets.PYPI_TEST_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
          skip_existing: true
          verbose: true

      - name: Test installation from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pdfarchitect
          python -c "import docuforge; print(f'Installed version: {docuforge.__version__}')"
          pdfarchitect --version
