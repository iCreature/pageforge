name: Deploy to PyPI

on:
  push:
    branches:
      - DF-02
  workflow_dispatch:  # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools setuptools-scm wheel

      - name: Build package
        run: |
          python -m build

      - name: Check distribution
        run: |
          python -m twine check dist/*

      # Run tests before deploying
      - name: Install test dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest

      # Only publish to Test PyPI on main branch pushes (non-tag)
      - name: Publish to PyPI (Test)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}

      - name: Test installation from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ docuforge
          python -c "import docuforge; print(f'Installed version: {docuforge.__version__}')"
          python -m docuforge.cli --version
