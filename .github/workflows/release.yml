name: Release to PyPI

on:
  push:
    tags:
      - 'v*'  # Run when version tags are pushed

# Only need permissions for GitHub releases
permissions:
  contents: write   # Required for creating GitHub releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning with setuptools-scm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools setuptools-scm

      - name: Build package
        run: |
          python -m build

      - name: Check distribution
        run: |
          python -m twine check dist/*

      - name: Smoke test installation
        run: |
          pip install dist/*.whl
          python -c "import docuforge; print(f'Installed version: {docuforge.__version__}')"
          python -m docuforge.cli --version

      # Upload to PyPI
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          skip_existing: true
          verbose: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
